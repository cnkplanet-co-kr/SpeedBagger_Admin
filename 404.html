<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA 라우팅: 404를 index.html로 리다이렉트
      var path = window.location.pathname + window.location.search
      window.location.replace(
        window.location.origin + '/?p=' + encodeURIComponent(path) + window.location.hash
      )
    </script>
  </head>
</html>
